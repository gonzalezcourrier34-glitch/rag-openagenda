services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocrag_api
    restart: unless-stopped
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - pocrag_network

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pocrag_dashboard
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    command: streamlit run dashboard/streamlit_app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    networks:
      - pocrag_network

volumes:
  app_data:

networks:
  pocrag_network:
    driver: bridge